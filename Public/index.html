<!DOCTYPE html>
<html>
<head>
<title>Vyshnavi Falooda Royal Club</title>

<style>
*{
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
background: linear-gradient(135deg,#3a003d,#6b0044,#3a003d);
color:white;
}

.card{
background:rgba(28,28,28,0.88);
padding:45px;
border-radius:22px;
max-width:430px;
width:92%;
text-align:center;
backdrop-filter: blur(14px);

box-shadow:
0 0 30px rgba(255,200,0,0.20),
0 0 70px rgba(255,150,0,0.10);

border:1px solid rgba(255,200,0,0.2);
}

.logo{
width:180px;
margin-bottom:15px;
}

h1{
color:#ffcc00;
font-size:28px;
margin-bottom:10px;
}

.subtitle{
color:#e5e5e5;
margin-bottom:25px;
font-size:16px;
}

.reward{
color:#ffcc00;
font-weight:bold;
}

input{
width:92%;
padding:15px;
margin:12px 0;
border-radius:12px;
border:none;
font-size:15px;
}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
background:linear-gradient(45deg,#ffcc00,#ff9900);
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<img src="logo.jpg" class="logo">

<h1>Vyshnavi Falooda Royal Club</h1>

<div class="subtitle">
Buy 5 Faloodas → Enjoy a 
<span class="reward">Free Falooda</span>
</div>

<input type="text" id="name" placeholder="Your Name" required>
<input type="tel" id="phone" placeholder="Mobile Number" required>
<input type="date" id="dob" required>

<button onclick="registerCustomer()">Join Royal Club</button>

</div>

<script>

async function registerCustomer() {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const dob = document.getElementById("dob").value;

    if(!name || !phone || !dob){
        alert("Please fill all details ❌");
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/add-customer", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, phone, dob })
        });

        const data = await res.json();

        alert(data.message);

        // 🔥 REDIRECT
        window.location.href = "dashboard.html?phone=" + phone;

    } catch (error) {
        alert("Server not reachable ❌ Check connection");
        console.error(error);
    }
}

</script>

</body>
</html>
