<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Your Rewards</title>

<style>
body{
font-family:Arial;
margin:0;
background: radial-gradient(circle at top,#6b0044,#1a001d);
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:20px 0;
}

/* 🔥 TOP BAR */
.top-bar{
position:fixed;
top:10px;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
z-index:1000;
}

.status-box, .time-box{
background:rgba(0,0,0,0.6);
padding:10px 18px;
border-radius:12px;
font-weight:bold;
backdrop-filter:blur(8px);
box-shadow:0 0 15px rgba(255,200,0,0.2);
}

/* 🔥 MAIN LAYOUT */
.main-layout{
display:flex;
justify-content:center;
align-items:flex-start;
gap:20px;
width:100%;
margin-top:80px;
}

/* 🔥 SIDE BOXES */
.side-box{
width:220px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(255,204,0,0.08);
transition:0.3s;
}

.side-box:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(255,204,0,0.25);
}

.side-box h3{ color:#ffcc00; margin-bottom:10px; }
.side-box p{ font-size:14px; margin-bottom:10px; color:#ccc; }

.side-box button{
padding:10px 16px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#25D366,#1ebe5d);
color:white;
cursor:pointer;
font-weight:bold;
}

/* 🔥 MAIN CARD */
.card{
background:rgba(30,30,30,0.85);
padding:40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;
backdrop-filter: blur(12px);

box-shadow:
0 0 25px rgba(255,200,0,0.25),
0 0 60px rgba(255,150,0,0.15);

border:1px solid rgba(255,200,0,0.2);
}

h1{ color:#ffcc00; margin-bottom:10px; }
#name{ margin-bottom:5px; font-size:20px; }
#welcome{ color:#aaa; margin-bottom:10px; }

.closedBox{
margin-top:15px;
padding:15px;
background:rgba(255,0,0,0.1);
border:1px solid rgba(255,0,0,0.3);
border-radius:10px;
color:#ff5252;
font-weight:bold;
display:none;
}

#progress{
margin-bottom:20px;
color:#ccc;
white-space: pre-line;
font-weight:500;
}

.stamp{
width:60px;height:60px;border-radius:50%;
display:inline-flex;justify-content:center;align-items:center;
margin:8px;font-size:24px;
background:#222;border:2px solid #ffcc00;
box-shadow:0 0 10px rgba(255,204,0,0.3);
transition:0.3s;
}

.filled{
background:linear-gradient(45deg,#ffcc00,#ff9900);
color:black;
transform:scale(1.15);
box-shadow:0 0 25px #ffcc00;
}

.reward-text{
margin-top:20px;
font-size:18px;
color:#ffcc00;
font-weight:bold;
}

.badge{
margin-top:10px;
font-size:14px;
}

.valid{ color:#00ff9c; }
.expired{ color:#ff4d4d; }

.qr{ margin-top:25px; }

/* 📱 MOBILE */
@media(max-width:900px){
.main-layout{
flex-direction:column;
align-items:center;
}

.side-box{
width:90%;
}
}

</style>
</head>

<body>

<!-- 🔥 TOP BAR -->
<div class="top-bar">
    <div id="storeStatus" class="status-box">Checking store...</div>
    <div id="dateTime" class="time-box">Loading time...</div>
</div>

<!-- 🔥 MAIN STRUCTURE -->
<div class="main-layout">

<!-- LEFT BOX -->
<div class="side-box">
<h3>📍 Visit Our Store</h3>
<p>Vyshnavi Falooda, Vijayawada</p>
<a href="https://maps.google.com/?q=Vyshnavi+Falooda+Vijayawada" target="_blank">
<button>Open Location 📍</button>
</a>
</div>

<!-- CENTER MAIN CARD -->
<div class="card">

<h1>Your Falooda Rewards 🥤</h1>

<div class="closedBox" id="closedBox">
🔴 Store is currently closed  
Please visit later 🙏
</div>

<h3 id="name"></h3>
<p id="welcome">Welcome back 👋</p>

<p id="progress"></p>

<div id="stamps">
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
</div>

<div class="reward-text">
Collect 5 → Get 1 FREE 🎁
</div>

<div class="badge">
<span class="valid" id="validRewards"></span><br>
<span class="expired" id="expiredRewards"></span>
</div>

<div class="qr">
<h4>Show this QR to staff</h4>
<img id="qr" width="160" style="border-radius:10px;">
</div>

</div>

<!-- RIGHT BOX -->
<div class="side-box">
<h3>🎯 Refer & Earn</h3>
<p>Share with friends & get rewards 🍨</p>
<button onclick="shareWhatsApp()">Share on WhatsApp</button>
</div>

</div>

<script>
// (NO CHANGES IN JS — YOUR ORIGINAL LOGIC KEPT SAME)
const BASE_URL = window.location.origin;
const params = new URLSearchParams(window.location.search);
const phone = params.get("phone");

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=" + phone;

let customerName = "";
let prevStatus = "";

function playOpenSound(){
    const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    audio.play();
}

function updateDateTime(){
    const now = new Date();
    document.getElementById("dateTime").innerText =
    now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateDateTime,1000);
updateDateTime();

async function checkStoreStatus(){
    try {
        const res = await fetch(BASE_URL + "/store-status");
        const data = await res.json();

        const statusEl = document.getElementById("storeStatus");
        const closedBox = document.getElementById("closedBox");

        if(data.status === "open"){
            statusEl.innerText = "🟢 Store is OPEN";
            statusEl.style.color = "#00e676";
            closedBox.style.display = "none";
        } else {
            statusEl.innerText = "🔴 Store is CLOSED";
            statusEl.style.color = "#ff5252";
            closedBox.style.display = "block";
        }

    } catch {
        document.getElementById("storeStatus").innerText = "Error loading store ❌";
    }
}

async function loadCustomer() {
    try {
        const res = await fetch(BASE_URL + "/get-customer", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ phone })
        });

        const data = await res.json();

        customerName = data.name;
        document.getElementById("name").innerText = data.name;

    } catch (err) {
        console.log("Error:", err);
    }
}

function shareWhatsApp(){
const message =
`Hi! I'm ${customerName} 👋

I tried falooda at Vyshnavi Falooda 🥰

📍 https://maps.google.com/?q=Vyshnavi+Falooda+Vijayawada`;

window.open("https://wa.me/?text="+encodeURIComponent(message));
}

checkStoreStatus();
loadCustomer();

setInterval(checkStoreStatus,5000);
setInterval(loadCustomer,3000);
</script>

</body>
</html>
