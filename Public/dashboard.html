<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Rewards</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

:root{
  --bg-1:#120014;
  --bg-2:#1d0627;
  --bg-3:#320a2f;
  --gold-1:#ffd36b;
  --gold-2:#ffb347;
  --gold-3:#ff8a00;
  --white:rgba(255,255,255,0.92);
  --muted:rgba(255,255,255,0.62);
  --border:rgba(255,211,107,0.22);
  --shadow:0 20px 60px rgba(0,0,0,0.45);
}

*{ box-sizing:border-box; }

body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:var(--white);
  min-height:100vh;
  padding:24px 0 40px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background:
    radial-gradient(circle at top left, rgba(255,170,0,0.08), transparent 25%),
    radial-gradient(circle at top right, rgba(255,0,102,0.12), transparent 28%),
    linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
}

/* TOP BAR */
.top-bar{
  position:fixed;
  top:16px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:1000;
}

.status-box,.time-box{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.10);
  padding:10px 16px;
  border-radius:14px;
  font-weight:600;
}

.top-closed{
  margin-left:10px;
  background:rgba(255,70,70,0.10);
  padding:10px 14px;
  border-radius:12px;
  color:#ff6b6b;
  display:none;
}

/* LAYOUT */
.main-layout{
  display:flex;
  gap:20px;
  margin-top:100px;
  width:100%;
  max-width:1200px;
}

/* SIDE BOX */
.side-box{
  width:230px;
  padding:20px;
  text-align:center;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(12px);
  transition:0.3s;
  margin-top:80px;
}

.side-box:hover{
  transform:translateY(-6px);
}

.side-box h3{
  color:var(--gold-1);
}

.side-box button{
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,var(--gold-1),var(--gold-3));
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* CARD */
.card{
  margin-top:50px;
  padding:40px;
  border-radius:30px;
  max-width:460px;
  width:100%;
  text-align:center;
  background:rgba(20,16,25,0.85);
  border:1px solid var(--border);
}

h1{
  background:linear-gradient(135deg,#fff,var(--gold-1));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

#progress{
  margin:20px 0;
  white-space:pre-line;
}

/* STAMPS */
.stamp{
  width:60px;
  height:60px;
  border-radius:50%;
  display:inline-flex;
  justify-content:center;
  align-items:center;
  margin:6px;
  font-size:24px;
  border:1px solid var(--gold-1);
}

.filled{
  background:linear-gradient(135deg,#ffe08a,#ff9200);
  color:black;
}

/* MOBILE */
@media(max-width:900px){
  .main-layout{
    flex-direction:column;
    align-items:center;
  }
  .side-box{
    width:90%;
    margin-top:0;
  }
}
</style>
</head>

<body>

<div class="top-bar">
    <div style="display:flex; align-items:center;">
        <div id="storeStatus" class="status-box">Checking store...</div>
        <div id="topClosed" class="top-closed">🔴 Please visit later 🙏</div>
    </div>
    <div id="dateTime" class="time-box">Loading time...</div>
</div>

<div class="main-layout">

<div class="side-box">
<h3>📍 Visit Our Store</h3>
<p>Vyshnavi Falooda, Vijayawada</p>
<a href="https://maps.google.com/?q=Vyshnavi+Falooda+Vijayawada" target="_blank">
<button>Open Location 📍</button>
</a>
</div>

<div class="card">

<h1>Your Falooda Rewards 🥤</h1>

<h3 id="name"></h3>
<p id="welcome">Welcome back 👋</p>

<p id="progress"></p>

<div id="stamps">
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
</div>

<div class="reward-text">
Collect 5 → Get 1 FREE 🎁
</div>

<div class="badge">
<span class="valid" id="validRewards"></span><br>
<span class="expired" id="expiredRewards"></span>
</div>

<div class="qr">
<h4>Show this QR to staff</h4>
<img id="qr" width="160" style="border-radius:10px;">
</div>

</div>

<div class="side-box">
<h3>🎯 Refer & Earn</h3>
<p>Share with friends & get rewards 🍨</p>
<button onclick="shareWhatsApp()">Share on WhatsApp</button>
</div>

</div>

<script>
const BASE_URL = window.location.origin;
const params = new URLSearchParams(window.location.search);
const phone = params.get("phone");

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=" + phone;

let customerName = "";

function updateDateTime(){
    const now = new Date();
    document.getElementById("dateTime").innerText =
    now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateDateTime,1000);
updateDateTime();

async function checkStoreStatus(){
    try {
        const res = await fetch(BASE_URL + "/store-status");
        const data = await res.json();

        const statusEl = document.getElementById("storeStatus");
        const closedBox = document.getElementById("topClosed");

        if(data.status === "open"){
            statusEl.innerText = "🟢 Store is OPEN";
            statusEl.style.color = "#00e676";
            closedBox.style.display = "none";
        } else {
            statusEl.innerText = "🔴 Store is CLOSED";
            statusEl.style.color = "#ff5252";
            closedBox.style.display = "block";
        }

    } catch {
        document.getElementById("storeStatus").innerText = "Error loading store ❌";
    }
}

async function loadCustomer() {
    try {
        const res = await fetch(BASE_URL + "/get-customer", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ phone })
        });

        const data = await res.json();

        customerName = data.name;
        document.getElementById("name").innerText = data.name;

        const current = data.points % 5;
        const remaining = current === 0 ? 5 : 5 - current;

        let message = data.validRewards > 0
            ? "🎉 You have " + data.validRewards + " FREE Falooda available!"
            : "You’ve Earned " + data.points + " Points ✨\nJust " + remaining + " More to Enjoy Free Falooda 🎁";

        document.getElementById("progress").innerText = message;

        const stamps = document.querySelectorAll(".stamp");
        stamps.forEach((stamp, index)=>{
            stamp.classList.toggle("filled", index < current);
        });

        document.getElementById("validRewards").innerText =
        data.validRewards > 0 ? "🎁 Available Rewards: " + data.validRewards : "";

        document.getElementById("expiredRewards").innerText =
        data.expiredRewards > 0 ? "❌ Expired Rewards: " + data.expiredRewards : "";

    } catch (err) {
        console.log(err);
    }
}

function shareWhatsApp(){
const message =
`Hi! I'm ${customerName} 👋

I tried falooda at Vyshnavi Falooda 🥰

📍 https://maps.google.com/?q=Vyshnavi+Falooda+Vijayawada`;

window.open("https://wa.me/?text="+encodeURIComponent(message));
}

checkStoreStatus();
loadCustomer();

setInterval(checkStoreStatus,5000);
setInterval(loadCustomer,3000);
</script>

</body>
</html>
