<!DOCTYPE html>
<html>
<head>
<title>Your Rewards</title>

<style>
body{
font-family:Arial;
margin:0;
background: radial-gradient(circle at top,#6b0044,#1a001d);
color:white;
display:flex;
justify-content:center;
align-items:flex-start; /* FIXED */
min-height:100vh; /* FIXED */
padding:20px 0; /* FIXED */
}

.card{
background:rgba(30,30,30,0.85);
padding:40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;

backdrop-filter: blur(12px);

box-shadow:
0 0 25px rgba(255,200,0,0.25),
0 0 60px rgba(255,150,0,0.15);

border:1px solid rgba(255,200,0,0.2);
}

h1{
color:#ffcc00;
margin-bottom:10px;
}

#name{
margin-bottom:5px;
font-size:20px;
}

#welcome{
color:#aaa;
margin-bottom:10px;
}

#progress{
margin-bottom:20px;
color:#ccc;
white-space: pre-line;
font-weight:500;
}

.stamp{
width:60px;
height:60px;
border-radius:50%;
display:inline-flex;
justify-content:center;
align-items:center;
margin:8px;
font-size:24px;

background:#222;
border:2px solid #ffcc00;

box-shadow:0 0 10px rgba(255,204,0,0.3);

transition:0.3s;
}

.filled{
background:linear-gradient(45deg,#ffcc00,#ff9900);
color:black;
transform:scale(1.15);
box-shadow:0 0 25px #ffcc00;
}

.reward-text{
margin-top:20px;
font-size:18px;
color:#ffcc00;
font-weight:bold;
}

.qr{
margin-top:25px;
}

/* ✅ SIDE BY SIDE SECTION */
.extra-section{
margin-top:30px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.1);

display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
text-align:center;
}

.extra-box{
flex:1;
min-width:150px;
}

.extra-box h3{
color:#ffcc00;
margin-bottom:10px;
}

.extra-box p{
font-size:14px;
margin-bottom:10px;
color:#ccc;
}

.extra-box button{
padding:8px 16px;
border:none;
border-radius:8px;
background:#ff4081;
color:white;
cursor:pointer;
}

.extra-box button:hover{
background:#ff1a66;
}
</style>
</head>

<body>

<div class="card">

<h1>Your Falooda Rewards 🥤</h1>

<h3 id="name"></h3>
<p id="welcome">Welcome back 👋</p>

<p id="progress"></p>

<div>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
</div>

<div class="reward-text">
Collect 5 → Get 1 FREE 🎁
</div>

<div class="qr">
<h4>Show this QR to staff</h4>
<img id="qr" width="160" style="border-radius:10px;">
</div>

<!-- ✅ UPDATED SECTION -->
<div class="extra-section">

  <!-- LEFT -->
  <div class="extra-box">
    <h3>📍 Visit Our Store</h3>
    <p>Vyshnavi Falooda, Vijayawada</p>

    <a href="https://maps.google.com/?q=Vyshnavi+Falooda+Vijayawada" target="_blank">
      <button>Open Location 📍</button>
    </a>
  </div>

  <!-- RIGHT -->
  <div class="extra-box">
    <h3>🎯 Refer & Earn</h3>
    <p>Refer 5 friends and get <b>1 FREE Scoop 🍨</b></p>

    <button onclick="shareReferral()">Share Referral</button>
  </div>

</div>

</div>

<script>

const BASE_URL = window.location.origin;

const params = new URLSearchParams(window.location.search);
const phone = params.get("phone");

if(!phone){
    alert("Invalid access ❌");
}

const qr = document.getElementById("qr");
qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=" + phone;

async function loadCustomer() {

    try {

        const res = await fetch(BASE_URL + "/get-customer", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ phone })
        });

        const data = await res.json();

        if(!data || data.error){
            return;
        }

        document.getElementById("name").innerText = data.name;

        let remaining = data.rewardTarget - data.points;

        document.getElementById("progress").innerText =
        "You’ve Earned " + data.points + " Reward Points ✨\n" +
        "Just " + remaining + " More to Enjoy Your Free Falooda 🎁";

        const stamps = document.querySelectorAll(".stamp");

        stamps.forEach((stamp, index) => {
            if(index < data.points){
                stamp.classList.add("filled");
            } else {
                stamp.classList.remove("filled");
            }
        });

        let lastPoints = localStorage.getItem("lastPoints");

        if(lastPoints == 5 && data.points == 0){
            setTimeout(() => {
                alert("🎉 Congratulations! You earned a FREE Falooda 🥤");
            }, 400);
        }

        localStorage.setItem("lastPoints", data.points);

    } catch (err) {
        console.log("Server error");
    }
}

function shareReferral() {
    const link = window.location.href;

    if (navigator.share) {
        navigator.share({
            title: "Vyshnavi Falooda Rewards",
            text: "Join and earn free rewards 🥤",
            url: link
        });
    } else {
        alert("Copy and share this link:\n" + link);
    }
}

loadCustomer();
setInterval(loadCustomer, 3000);

</script>

</body>
</html>
