<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Your Rewards</title>

<style>
body{
font-family:Arial;
margin:0;
background: radial-gradient(circle at top,#6b0044,#1a001d);
color:white;
display:flex;
justify-content:center;
align-items:flex-start;
min-height:100vh;
padding:20px 0;
}

.card{
background:rgba(30,30,30,0.85);
padding:40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:420px;
backdrop-filter: blur(12px);
box-shadow:
0 0 25px rgba(255,200,0,0.25),
0 0 60px rgba(255,150,0,0.15);
border:1px solid rgba(255,200,0,0.2);
}

h1{ color:#ffcc00; margin-bottom:10px; }

/* 💎 NEW TOP BAR */
.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
padding:10px 15px;
border-radius:12px;
background:rgba(255,255,255,0.05);
font-size:14px;
}

.badge-pill{
padding:6px 14px;
border-radius:20px;
font-weight:bold;
}

.open-pill{
background:#00e67620;
color:#00e676;
}

.closed-pill{
background:#ff525220;
color:#ff5252;
}

/* 🔔 ALERTS */
.alert-box{
display:none;
margin-bottom:10px;
padding:10px;
border-radius:10px;
font-size:14px;
}

.closing-alert{
background:#ff980020;
color:#ff9800;
}

.offer-alert{
background:#00e67620;
color:#00e676;
}

/* EXISTING CODE BELOW (UNCHANGED) */

#name{ margin-bottom:5px; font-size:20px; }
#welcome{ color:#aaa; margin-bottom:10px; }

#storeStatus{
margin-bottom:15px;
font-size:18px;
font-weight:bold;
}

.closedBox{
margin-top:15px;
padding:15px;
background:rgba(255,0,0,0.1);
border:1px solid rgba(255,0,0,0.3);
border-radius:10px;
color:#ff5252;
font-weight:bold;
display:none;
}

#progress{
margin-bottom:20px;
color:#ccc;
white-space: pre-line;
font-weight:500;
}

.stamp{
width:60px;height:60px;border-radius:50%;
display:inline-flex;justify-content:center;align-items:center;
margin:8px;font-size:24px;
background:#222;border:2px solid #ffcc00;
box-shadow:0 0 10px rgba(255,204,0,0.3);
transition:0.3s;
}

.filled{
background:linear-gradient(45deg,#ffcc00,#ff9900);
color:black;
transform:scale(1.15);
box-shadow:0 0 25px #ffcc00;
}

.reward-text{
margin-top:20px;
font-size:18px;
color:#ffcc00;
font-weight:bold;
}

.badge{
margin-top:10px;
font-size:14px;
}

.valid{ color:#00ff9c; }
.expired{ color:#ff4d4d; }

.qr{ margin-top:25px; }

/* EXTRA SECTION SAME */
.extra-section{
margin-top:40px;
padding-top:25px;
border-top:1px solid rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
align-items:stretch;
gap:20px;
}

.extra-box{
width:48%;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(255,204,0,0.08);
transition:0.3s;
}

.extra-box:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(255,204,0,0.25);
}

.extra-box h3{ color:#ffcc00; }
.extra-box button{
padding:10px;
border:none;
border-radius:10px;
background:#25D366;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<!-- 💎 NEW TOP BAR -->
<div class="top-bar">
    <div id="liveTime"></div>
    <div id="statusBadge" class="badge-pill">Loading</div>
</div>

<!-- 🔔 ALERTS -->
<div id="closingAlert" class="alert-box closing-alert">
⏰ Closing soon! Visit fast
</div>

<div id="offerAlert" class="alert-box offer-alert">
🎉 We are OPEN! Come enjoy falooda
</div>

<h1>Your Falooda Rewards 🥤</h1>

<!-- EXISTING UI CONTINUES SAME -->

<div id="storeStatus">Checking store...</div>
<div class="closedBox" id="closedBox">
🔴 Store is currently closed  
Please visit later 🙏
</div>

<h3 id="name"></h3>
<p id="welcome">Welcome back 👋</p>

<p id="progress"></p>

<div id="stamps">
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
<span class="stamp">🥤</span>
</div>

<div class="reward-text">
Collect 5 → Get 1 FREE 🎁
</div>

<div class="badge">
<span class="valid" id="validRewards"></span><br>
<span class="expired" id="expiredRewards"></span>
</div>

<div class="qr">
<h4>Show this QR to staff</h4>
<img id="qr" width="160" style="border-radius:10px;">
</div>

<div class="extra-section">

<div class="extra-box">
<h3>📍 Visit Our Store</h3>
<a href="https://maps.google.com/?q=Vyshnavi+Falooda+Vijayawada" target="_blank">
<button>Open Location 📍</button>
</a>
</div>

<div class="extra-box">
<h3>🎯 Refer & Earn</h3>
<button onclick="shareWhatsApp()">Share</button>
</div>

</div>

</div>

<script>

const BASE_URL = window.location.origin;
const params = new URLSearchParams(window.location.search);
const phone = params.get("phone");

document.getElementById("qr").src =
"https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=" + phone;

/* 🕒 LIVE TIME */
function updateTime(){
    document.getElementById("liveTime").innerText =
    new Date().toLocaleString();
}
setInterval(updateTime,1000);
updateTime();

/* 🟢 STORE STATUS + PREMIUM */
async function checkStoreStatus(){
    const res = await fetch(BASE_URL + "/store-status");
    const data = await res.json();

    const badge = document.getElementById("statusBadge");
    const offer = document.getElementById("offerAlert");

    if(data.status === "open"){
        badge.innerText = "🟢 OPEN";
        badge.className = "badge-pill open-pill";
        offer.style.display = "block";
    }else{
        badge.innerText = "🔴 CLOSED";
        badge.className = "badge-pill closed-pill";
        offer.style.display = "none";
    }

    /* KEEP YOUR ORIGINAL LOGIC */
    const statusEl = document.getElementById("storeStatus");
    const closedBox = document.getElementById("closedBox");

    if(data.status === "open"){
        statusEl.innerText = "🟢 Store is OPEN";
        statusEl.style.color = "#00e676";
        closedBox.style.display = "none";
    } else {
        statusEl.innerText = "🔴 Store is CLOSED";
        statusEl.style.color = "#ff5252";
        closedBox.style.display = "block";
    }
}

async function loadCustomer() {
    const res = await fetch(BASE_URL + "/get-customer", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ phone })
    });

    const data = await res.json();

    document.getElementById("name").innerText = data.name;

    const current = data.points % 5;

    document.querySelectorAll(".stamp").forEach((s,i)=>{
        if(i<current) s.classList.add("filled");
    });

    document.getElementById("validRewards").innerText =
    data.validRewards > 0 ? "🎁 Available Rewards: " + data.validRewards : "";
}

function shareWhatsApp(){
window.open("https://wa.me/?text=Try Vyshnavi Falooda!");
}

checkStoreStatus();
loadCustomer();

setInterval(checkStoreStatus,5000);
setInterval(loadCustomer,3000);

</script>

</body>
</html>
