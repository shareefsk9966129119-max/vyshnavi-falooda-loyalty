<!DOCTYPE html>
<html>
<head>
<title>Admin Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
background:#1a001d;
color:white;
text-align:center;
padding-top:30px;
}

h1{ color:#ffcc00; }

#reader{
width:300px;
margin:auto;
margin-top:20px;
}

.card{
margin-top:20px;
}

input{
padding:10px;
border-radius:8px;
width:250px;
margin-top:15px;
border:none;
outline:none;
}

button{
margin:10px;
padding:12px 20px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.add{ background:green; color:white; }
.sub{ background:red; color:white; }
.update{ background:#ffcc00; color:black; }

/* 🟢 STORE BUTTONS */
.openBtn{ background:#00c853; color:white; }
.closeBtn{ background:#d50000; color:white; }

/* 🆕 AUTO MODE BUTTON */
.autoBtn{ background:#2196f3; color:white; }

#count{
font-size:22px;
margin:0 10px;
}

/* 🟢 STATUS DISPLAY */
#storeStatus{
margin-top:20px;
font-size:20px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Admin Scanner 📷</h1>
<p>Scan Customer QR OR Enter Phone</p>

<!-- 🟢 STORE CONTROL -->
<h2>Store Control</h2>

<div>
<button class="openBtn" onclick="setStoreStatus('open')">🟢 Open Store</button>
<button class="closeBtn" onclick="setStoreStatus('closed')">🔴 Close Store</button>

<!-- 🆕 AUTO MODE -->
<button class="autoBtn" onclick="enableAuto()">⏰ Auto Mode</button>
</div>

<button onclick="toggleMenu()" style="background:#9c27b0;color:white;">
🍽 Toggle Menu
</button>

<p id="storeStatus">Checking store status...</p>

<div id="reader"></div>

<h3 id="result"></h3>

<input type="text" id="phoneInput" placeholder="Enter phone manually">

<div class="card">

<h3 id="name"></h3>
<p id="points"></p>

<div>
<button class="sub" onclick="change(-1)">➖</button>
<span id="count">1</span>
<button class="add" onclick="change(1)">➕</button>
</div>

<button class="update" onclick="updatePoints()">Update Points</button>

</div>

<script>

// 🔐 ADMIN SECURITY
const ADMIN_PASSWORD = "1234";

const enteredPassword = prompt("Enter Admin Password 🔐");

if (enteredPassword !== ADMIN_PASSWORD) {

    alert("Access Denied ❌");

    document.body.innerHTML = `
        <h1 style="color:red; margin-top:100px;">Access Denied ❌</h1>
        <p>You are not authorized to access this page</p>
    `;

    throw new Error("Unauthorized Access");
}

// ✅ BASE URL
const BASE_URL = window.location.origin;

let scannedPhone = "";
let currentPhone = "";
let currentCount = 1;

// 🟢 GET STORE STATUS
async function getStoreStatus() {
    try {
        const res = await fetch(BASE_URL + "/store-status");
        const data = await res.json();

        const el = document.getElementById("storeStatus");

        if (data.status === "open") {
            el.innerText = "🟢 Store is OPEN";
            el.style.color = "#00e676";
        } else {
            el.innerText = "🔴 Store is CLOSED";
            el.style.color = "#ff5252";
        }

    } catch {
        document.getElementById("storeStatus").innerText = "Error loading status ❌";
    }
}

// 🟢 SET STORE STATUS
async function setStoreStatus(status) {
    try {
        const res = await fetch(BASE_URL + "/store-status", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ status })
        });

        const data = await res.json();

        alert(data.message);

        getStoreStatus();

    } catch {
        alert("Error updating store ❌");
    }
}

// 🆕 ENABLE AUTO MODE
async function enableAuto(){
    try{
        const res = await fetch(BASE_URL + "/auto-mode", {
            method: "POST"
        });

        const data = await res.json();

        alert(data.message);

        getStoreStatus();

    }catch{
        alert("Error enabling auto ❌");
    }
}

// 🔁 Change count
function change(val){
    currentCount += val;
    if(currentCount < 1) currentCount = 1;
    document.getElementById("count").innerText = currentCount;
}

// ✅ QR SCAN SUCCESS
function onScanSuccess(decodedText) {

    try {
        const url = new URL(decodedText);
        scannedPhone = url.searchParams.get("phone");
    } catch {
        scannedPhone = decodedText;
    }

    document.getElementById("result").innerText =
    "Scanned Phone: " + scannedPhone;

    loadCustomer(scannedPhone);
}

// ✅ START SCANNER
let scanner = new Html5QrcodeScanner("reader", {
    fps: 10,
    qrbox: 250
});

scanner.render(onScanSuccess);

// ✅ LOAD CUSTOMER
async function loadCustomer(phone){

    if(!phone){
        phone = document.getElementById("phoneInput").value;
    }

    if(!phone){
        return;
    }

    currentPhone = phone;

    try {
        const res = await fetch(BASE_URL + "/get-customer", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({phone})
        });

        const data = await res.json();

        if(data.message){
            document.getElementById("name").innerText = "";
            document.getElementById("points").innerText = "Customer not found ❌";
            return;
        }

        document.getElementById("name").innerText = data.name;
        document.getElementById("points").innerText =
        "Current Points: " + data.points;

    } catch (err) {
        alert("Server error ❌");
    }
}

// ENTER KEY
document.getElementById("phoneInput").addEventListener("keypress", function(e) {
    if(e.key === "Enter"){
        loadCustomer();
    }
});

// UPDATE POINTS
async function updatePoints(){

    if(!currentPhone){
        alert("Scan or enter customer first ❌");
        return;
    }

    try {
        const res = await fetch(BASE_URL + "/add-points", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                phone: currentPhone,
                pointsToAdd: currentCount
            })
        });

        const data = await res.json();

        alert(data.message);

        loadCustomer(currentPhone);

        currentCount = 1;
        document.getElementById("count").innerText = currentCount;

    } catch (err) {
        alert("Server error ❌");
    }
}

// 🍽 TOGGLE MENU
async function toggleMenu(){
    try{
        const res = await fetch(BASE_URL + "/toggle-menu", {
            method: "POST"
        });

        const data = await res.json();

        alert(data.message);

    }catch{
        alert("Error toggling menu ❌");
    }
}

// LOAD STATUS
getStoreStatus();

// AUTO REFRESH
setInterval(getStoreStatus, 5000);

</script>

</body>
</html>
