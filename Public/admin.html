<!DOCTYPE html>
<html>
<head>
<title>Admin Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
background:#1a001d;
color:white;
text-align:center;
padding-top:30px;
}

h1{ color:#ffcc00; }

#reader{
width:300px;
margin:auto;
margin-top:20px;
}

.card{
margin-top:20px;
}

input{
padding:10px;
border-radius:8px;
width:200px;
margin:10px;
border:none;
outline:none;
}

button{
margin:10px;
padding:12px 20px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.add{ background:green; color:white; }
.sub{ background:red; color:white; }
.update{ background:#ffcc00; color:black; }

#count{
font-size:22px;
margin:0 10px;
}

/* 🔥 PREMIUM TOGGLE */
.toggle{
position:relative;
width:200px;
height:60px;
border-radius:40px;
margin:20px auto;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
background:#222;
transition:0.3s;
}

.slider{
position:absolute;
width:90px;
height:50px;
border-radius:30px;
left:5px;
transition:0.3s;
background:#444;
}

.toggle.open{
background:#e8f5e9;
color:black;
}

.toggle.open .slider{
left:105px;
background:#1b5e20;
}

.toggle.closed{
background:#2a1a1a;
color:white;
}

.toggle.closed .slider{
left:5px;
background:#b71c1c;
}

#toggleText{
z-index:2;
}

/* ⏰ TIME BOX */
.time-box{
margin-top:20px;
}

.saveBtn{
background:#00c853;
color:white;
}

/* STATUS TEXT */
#storeStatus{
margin-top:10px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<h1>Admin Scanner 📷</h1>

<h2>Store Control</h2>

<!-- 🔥 TOGGLE -->
<div id="toggleSwitch" class="toggle" onclick="toggleStore()">
    <div class="slider"></div>
    <span id="toggleText">OPEN</span>
</div>

<p id="storeStatus"></p>

<!-- ⏰ TIME CONTROL -->
<div class="time-box">
    <h3>Set Store Timing ⏰</h3>
    <input type="time" id="openTime">
    <input type="time" id="closeTime"><br>
    <button class="saveBtn" onclick="saveTiming()">Save Timing</button>
</div>

<hr style="margin:30px 0; border:1px solid #444;">

<p>Scan Customer QR OR Enter Phone</p>

<div id="reader"></div>

<h3 id="result"></h3>

<input type="text" id="phoneInput" placeholder="Enter phone manually">

<div class="card">

<h3 id="name"></h3>
<p id="points"></p>

<div>
<button class="sub" onclick="change(-1)">➖</button>
<span id="count">1</span>
<button class="add" onclick="change(1)">➕</button>
</div>

<button class="update" onclick="updatePoints()">Update Points</button>

</div>

<script>

// 🔐 ADMIN SECURITY
const ADMIN_PASSWORD = "1234";
const enteredPassword = prompt("Enter Admin Password 🔐");

if (enteredPassword !== ADMIN_PASSWORD) {
    document.body.innerHTML = `<h1 style="color:red;margin-top:100px;">Access Denied ❌</h1>`;
    throw new Error("Unauthorized");
}

const BASE_URL = window.location.origin;

let currentStatus = "open";
let currentPhone = "";
let currentCount = 1;

// 🔥 TOGGLE FUNCTION
async function toggleStore(){

    const newStatus = currentStatus === "open" ? "closed" : "open";

    const res = await fetch(BASE_URL + "/store-status",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ status:newStatus })
    });

    const data = await res.json();
    currentStatus = data.status;

    updateToggleUI();
}

// UI UPDATE
function updateToggleUI(){
    const toggle = document.getElementById("toggleSwitch");
    const text = document.getElementById("toggleText");
    const status = document.getElementById("storeStatus");

    if(currentStatus === "open"){
        toggle.className = "toggle open";
        text.innerText = "OPEN";
        status.innerText = "🟢 Store is OPEN";
        status.style.color = "#00e676";
    }else{
        toggle.className = "toggle closed";
        text.innerText = "CLOSED";
        status.innerText = "🔴 Store is CLOSED";
        status.style.color = "#ff5252";
    }
}

// LOAD STATUS
async function loadStatus(){
    const res = await fetch(BASE_URL + "/store-status");
    const data = await res.json();
    currentStatus = data.status;
    updateToggleUI();
}

// ⏰ SAVE TIMING
async function saveTiming(){
    const openTime = document.getElementById("openTime").value;
    const closeTime = document.getElementById("closeTime").value;

    await fetch(BASE_URL + "/store-timing",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ openTime, closeTime })
    });

    alert("Timing saved ✅");
}

// EXISTING FUNCTIONS (SAFE)
function change(val){
    currentCount += val;
    if(currentCount < 1) currentCount = 1;
    document.getElementById("count").innerText = currentCount;
}

function onScanSuccess(decodedText) {
    currentPhone = decodedText;
    loadCustomer(currentPhone);
}

let scanner = new Html5QrcodeScanner("reader",{fps:10,qrbox:250});
scanner.render(onScanSuccess);

async function loadCustomer(phone){
    const res = await fetch(BASE_URL + "/get-customer",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({phone})
    });

    const data = await res.json();

    if(data.message){
        document.getElementById("points").innerText = "Not found ❌";
        return;
    }

    document.getElementById("name").innerText = data.name;
    document.getElementById("points").innerText = "Points: "+data.points;
}

async function updatePoints(){
    if(!currentPhone) return alert("Scan first ❌");

    const res = await fetch(BASE_URL + "/add-points",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
            phone: currentPhone,
            pointsToAdd: currentCount
        })
    });

    const data = await res.json();
    alert(data.message);

    loadCustomer(currentPhone);
    currentCount = 1;
    document.getElementById("count").innerText = 1;
}

// INIT
loadStatus();

</script>

</body>
</html>
